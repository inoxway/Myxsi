<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Myxsi - Iniciar Sesión</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(67, 97, 238, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4361ee, #7209b7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #64748b;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #f8fafc;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(67, 97, 238, 0.3);
            transition: all 0.3s;
        }

        .input-group:focus-within {
            border-color: #4361ee;
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
        }

        .input-group i {
            padding: 0 15px;
            color: #64748b;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 15px 14px 0;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
        }

        .input-group input::placeholder {
            color: #475569;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4361ee, #7209b7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }

        .error-message {
            background: rgba(239, 71, 111, 0.2);
            border-left: 3px solid #ef476f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #ef476f;
            font-size: 0.85rem;
        }

        .info-message {
            background: rgba(6, 255, 165, 0.1);
            border-left: 3px solid #06ffa5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #06ffa5;
            font-size: 0.85rem;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-cube" style="font-size: 3rem; color: #4361ee;"></i>
                <h1>Panel Myxsi</h1>
                <p>Control Total de tu Servidor Debian</p>
            </div>

            <div class="info-message">
                <i class="fas fa-info-circle"></i> Usa tu usuario y contraseña del sistema
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Usuario del Sistema</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="usuario" placeholder="Ej: root, tu_usuario" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="contraseña" placeholder="Tu contraseña del sistema" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>

            <div class="footer">
                <p>Panel de Administración Myxsi</p>
                <p>Autenticación contra usuarios del sistema</p>
            </div>
        </div>
    </div>
</body>
</html>
